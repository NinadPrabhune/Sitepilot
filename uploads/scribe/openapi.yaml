            application/json:
              schema:
                type: object
                example:
                  message: 'The route api/activities could not be found.'
                properties:
                  message:
                    type: string
                    example: 'The route api/activities could not be found.'
      tags:
        - Activities
    post:
      summary: 'Create Activity'
      operationId: createActivity
      description: 'Create a new activity in the system'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '{"status": true, "message": "Activity created successfully", "data": {...}}'
      tags:
        - Activities
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                assign_to:
                  type: array
                  description: 'Array of user IDs to assign.'
                  example:
                    - 1
                    - 2
                    - 3
                  items:
                    type: string
                title:
                  type: string
                  description: 'Activity title.'
                  example: 'Foundation work'
                start_date:
                  type: date
                  description: 'Start date.'
                  example: '2024-01-01'
                due_date:
                  type: date
                  description: 'Due date.'
                  example: '2024-01-31'
                scope:
                  type: string
                  description: 'Activity scope/description.'
                  example: 'Building foundation for block A'
                quantity:
                  type: integer
                  description: 'Total quantity.'
                  example: 100
                unit:
                  type: string
                  description: 'Unit of measurement.'
                  example: sqft
                priority:
                  type: string
                  description: 'Priority level (low, medium, high).'
                  example: high
                completed_quantity:
                  type: integer
                  description: 'optional Initial completed quantity.'
                  example: 0
                created_by:
                  type: integer
                  description: 'Creator user ID.'
                  example: 1
                workspace_id:
                  type: integer
                  description: 'Workspace ID.'
                  example: 1
                site_id:
                  type: integer
                  description: 'Site/Project ID.'
                  example: 5
                reference_file:
                  type: string
                  format: binary
                  description: 'optional Reference document (max 20MB).'
              required:
                - assign_to
                - title
                - start_date
                - due_date
                - scope
                - quantity
                - unit
                - priority
                - created_by
                - workspace_id
                - site_id
