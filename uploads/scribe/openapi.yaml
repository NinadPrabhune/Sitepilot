  /api/grn:
    post:
      summary: 'Create GRN from mobile application.'
      operationId: createGRNFromMobileApplication
      description: 'Supports both PO-based and Direct GRN.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '{"status": true, "message": "GRN created successfully", "data": {...}}'
      tags:
        - 'Goods Received Note (GRN)'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                grn_type:
                  type: string
                  description: 'Type (against_po or direct).'
                  example: against_po
                grn_date:
                  type: date
                  description: 'GRN date.'
                  example: '2024-01-15'
                delivery_challan_number:
                  type: string
                  description: 'optional Delivery challan number.'
                  example: DC-123
                vehicle_number:
                  type: string
                  description: 'optional Vehicle number.'
                  example: MH-01-AB-1234
                gate_entry_number:
                  type: string
                  description: 'optional Gate entry number.'
                  example: GE-456
                description:
                  type: string
                  description: 'optional Description.'
                  example: 'Material delivery'
                received_by:
                  type: string
                  description: 'optional Received by.'
                  example: 'John Doe'
                remarks:
                  type: string
                  description: 'optional Remarks.'
                  example: 'Received in good condition'
                items:
                  type: array
                  description: 'Array of GRN items.'
                  example:
                    - architecto
                  items:
                    type: string
                delivery_challan_file:
                  type: string
                  format: binary
                  description: 'optional Delivery challan document (max 10MB).'
                reference_file:
                  type: string
                  format: binary
                  description: 'optional Reference document (max 10MB).'
                po_id:
                  type: integer
                  description: 'if grn_type=against_po Purchase Order ID.'
                  example: 1
                supplier_id:
                  type: integer
                  description: 'if grn_type=direct Supplier ID.'
                  example: 3
                site_id:
                  type: integer
                  description: 'if grn_type=direct Site ID.'
                  example: 5
                supplier_invoice_number:
                  type: string
                  description: 'if grn_type=direct Supplier invoice number.'
                  example: INV-001
                supplier_invoice_date:
                  type: date
                  description: 'optional if grn_type=direct Supplier invoice date.'
                  example: '2024-01-15'
                tax_type:
                  type: string
                  description: 'if grn_type=direct Tax type (cgst or igst).'
                  example: cgst
              required:
                - grn_type
                - grn_date
                - items
                - po_id
                - supplier_id
                - site_id
                - supplier_invoice_number
                - tax_type
    get:
